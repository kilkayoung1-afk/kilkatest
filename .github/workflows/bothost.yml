name: bothost

on:
  push:
    branches: [main]
    paths:
      - "bothost/**"
      - ".github/workflows/bothost.yml"
  pull_request:
    paths:
      - "bothost/**"
      - ".github/workflows/bothost.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bothost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bothost/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest mypy ruff
      - name: Ruff (lint)
        run: ruff check bothost tests
      - name: Ruff (format)
        run: ruff format --check bothost tests
      - name: Mypy
        run: mypy bothost
      - name: Pytest
        run: pytest -q
