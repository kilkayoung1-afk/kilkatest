services:
  bothost:
    build: .
    container_name: bothost
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    # The bot needs access to the host docker socket to spawn user-bot containers.
    # Restrict the network of the parent bot to outbound only.
